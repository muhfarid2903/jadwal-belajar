<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#111111">
<title>Jadwal Belajar / Study Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  font-family:'Space Grotesk',system-ui,sans-serif;
  background:#111;color:#F0EFE8;
  min-height:100vh;overscroll-behavior:none;
}
:root{
  --y:#F5E642;--yd:#C9BC1A;
  --s1:#1A1A1A;--s2:#222;--bd:#2A2A2A;
  --mt:#F0EFE8;--mu:#666;
}
.app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:48px}

/* TOP BAR */
.topbar{
  padding:calc(env(safe-area-inset-top,0px) + 20px) 20px 0;
  margin-bottom:22px;
}
.toprow{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0}
.greet{font-size:12px;color:var(--mu);letter-spacing:.1em;margin-bottom:6px;font-family:'Space Mono',monospace;font-weight:700}
.dayname{font-size:38px;font-weight:700;color:var(--mt);letter-spacing:-2px;line-height:.95}
.datestr{font-size:11px;color:var(--mu);margin-top:8px;font-family:'Space Mono',monospace;letter-spacing:.05em}

/* STREAK + LANG ROW */
.right-col{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.spill{background:var(--y);border-radius:16px;padding:12px 16px;text-align:center;min-width:78px}
.snum{font-size:34px;font-weight:700;color:#111;line-height:1;font-family:'Space Mono',monospace}
.slbl{font-size:10px;color:rgba(0,0,0,.55);margin-top:3px;font-weight:700;letter-spacing:.08em}

/* LANG TOGGLE */
.lang-toggle{
  display:flex;background:var(--s2);border-radius:10px;
  border:1px solid var(--bd);overflow:hidden;
}
.ltab{
  font-size:12px;font-weight:700;padding:7px 12px;
  border:none;cursor:pointer;background:transparent;
  color:var(--mu);transition:all .18s;font-family:'Space Mono',monospace;
  letter-spacing:.06em;
}
.ltab.on{background:var(--y);color:#111;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 20px;margin-bottom:24px;margin-top:20px}
.sc{background:var(--s1);border-radius:14px;padding:14px 8px;text-align:center;border:1px solid var(--bd)}
.scn{font-size:28px;font-weight:700;color:var(--y);font-family:'Space Mono',monospace}
.scl{font-size:11px;color:var(--mu);margin-top:3px;font-weight:600;letter-spacing:.04em}

/* TABS */
.tabs{display:flex;padding:0 20px;gap:8px;margin-bottom:24px}
.tab{
  flex:1;font-size:13px;font-weight:700;letter-spacing:.05em;
  padding:12px 0;border-radius:10px;
  border:1px solid var(--bd);cursor:pointer;
  background:transparent;color:var(--mu);
  transition:all .18s;font-family:'Space Grotesk',sans-serif;
}
.tab.on{background:var(--y);color:#111;border-color:var(--y)}

/* CONTENT */
.px{padding:0 20px}
.sec{display:none}.sec.show{display:block}
.slabel{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.12em;color:var(--mu);
  margin-bottom:12px;font-family:'Space Mono',monospace;
  display:flex;align-items:center;gap:10px;
}
.slabel::after{content:'';flex:1;height:1px;background:var(--bd)}

/* MUST */
.mcard{
  background:var(--s1);border-radius:18px;
  padding:20px 18px;display:flex;align-items:center;gap:16px;
  border:1px solid var(--bd);cursor:pointer;
  transition:border-color .2s,transform .12s;margin-bottom:12px;
}
.mcard:active{transform:scale(.975)}
.mcard.ready{border-color:var(--y)}
.mcard.done{opacity:.4;border-color:var(--bd)}
.mcard.done .mname{text-decoration:line-through;color:var(--mu)}
.cbtn{
  width:54px;height:54px;border-radius:50%;
  border:2px solid var(--bd);background:var(--s2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .22s;
}
.cbtn.on{background:var(--y);border-color:var(--y)}
.cbtn svg{opacity:0;transition:opacity .2s}
.cbtn.on svg{opacity:1}
.mbody{flex:1;min-width:0}
.mname{font-size:19px;font-weight:700;color:var(--mt);margin-bottom:4px;letter-spacing:-.4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msub{font-size:12px;color:var(--mu);font-family:'Space Mono',monospace}
.mpill{display:inline-block;font-size:11px;font-weight:700;padding:4px 12px;border-radius:6px;margin-top:8px;letter-spacing:.06em}
.marr{font-size:22px;color:var(--bd);flex-shrink:0}

/* PROGRESS */
.pcard{background:var(--s1);border-radius:14px;padding:16px 18px;margin-bottom:20px;border:1px solid var(--bd)}
.prow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.ptitle{font-size:13px;font-weight:600;color:var(--mt)}
.pval{font-size:16px;font-weight:700;color:var(--y);font-family:'Space Mono',monospace}
.ptrack{height:6px;background:var(--bd);border-radius:6px;overflow:hidden}
.pfill{height:100%;border-radius:6px;background:var(--y);transition:width .6s cubic-bezier(.4,0,.2,1)}

/* WEEK DOTS */
.wstrip{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:20px}
.wd{background:var(--s1);border-radius:12px;padding:12px 4px;text-align:center;border:1px solid var(--bd)}
.wd.today{border-color:var(--y);background:rgba(245,230,66,.07)}
.wd.donew{background:rgba(245,230,66,.05);border-color:rgba(245,230,66,.25)}
.wdl{font-size:10px;font-weight:700;color:var(--mu);display:block;margin-bottom:7px;font-family:'Space Mono',monospace;letter-spacing:.04em}
.wd.today .wdl{color:var(--y)}
.wd.donew .wdl{color:var(--yd)}
.wdot{width:8px;height:8px;border-radius:50%;background:var(--bd);margin:0 auto}
.wd.today .wdot{background:var(--y)}
.wd.donew .wdot{background:var(--yd)}

/* BLOCKS */
.blist{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.blk{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;background:var(--s1);border:1px solid var(--bd)}
.blk.now{border-color:var(--y);background:rgba(245,230,66,.05)}
.bico{width:44px;height:44px;border-radius:12px;background:var(--s2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.blk.now .bico{background:rgba(245,230,66,.12);border-color:rgba(245,230,66,.3)}
.bbd{flex:1}
.bbt{font-size:11px;color:var(--mu);margin-bottom:3px;font-family:'Space Mono',monospace;font-weight:700;letter-spacing:.05em}
.blk.now .bbt{color:var(--y)}
.bbd2{font-size:14px;font-weight:600;color:var(--mt)}
.nchip{font-size:10px;font-weight:700;background:var(--y);color:#111;padding:2px 8px;border-radius:5px;margin-left:6px;vertical-align:middle;font-family:'Space Mono',monospace;letter-spacing:.06em}

/* NOTIF */
.nbtn{
  display:flex;align-items:center;gap:14px;
  padding:16px;background:var(--s1);border-radius:14px;
  border:1px solid var(--bd);cursor:pointer;width:100%;
  transition:border-color .2s;
}
.nbtn:active{border-color:var(--y)}
.nico{width:44px;height:44px;border-radius:12px;background:rgba(245,230,66,.1);border:1px solid rgba(245,230,66,.2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.nbd{flex:1;text-align:left}
.ntitle{font-size:14px;font-weight:700;color:var(--mt)}
.nsub{font-size:12px;color:var(--mu);margin-top:2px;font-family:'Space Mono',monospace}
.narr{font-size:22px;color:var(--bd)}

/* LIST */
.lcard{background:var(--s1);border-radius:14px;border:1px solid var(--bd);padding:0 16px;margin-bottom:12px}
.ritem{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--bd)}
.ritem:last-child{border:none}
.rdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rdate{font-size:12px;color:var(--mu);min-width:52px;font-family:'Space Mono',monospace;font-weight:700}
.rname{font-size:14px;font-weight:600;color:var(--mt);flex:1}
.rok{font-size:13px;font-weight:700;font-family:'Space Mono',monospace}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="toprow">
      <div>
        <div class="greet" id="greet"></div>
        <div class="dayname" id="dayname"></div>
        <div class="datestr" id="datestr"></div>
      </div>
      <div class="right-col">
        <div class="spill">
          <div class="snum" id="stn">0</div>
          <div class="slbl" id="slbl-streak">HARI 🔥</div>
        </div>
        <div class="lang-toggle">
          <button class="ltab on" id="lt-id" onclick="setLang('id')">ID</button>
          <button class="ltab" id="lt-en" onclick="setLang('en')">EN</button>
        </div>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="sc"><div class="scn" id="sw">0</div><div class="scl" id="lbl-week">minggu ini</div></div>
    <div class="sc"><div class="scn" id="sm">0</div><div class="scl" id="lbl-month">bulan ini</div></div>
    <div class="sc"><div class="scn" id="stot">0</div><div class="scl" id="lbl-total">total</div></div>
  </div>

  <div class="tabs">
    <button class="tab on" id="tab-today" onclick="showTab('today',this)"></button>
    <button class="tab" id="tab-week" onclick="showTab('week',this)"></button>
    <button class="tab" id="tab-hist" onclick="showTab('hist',this)"></button>
  </div>

  <div class="px sec show" id="sec-today">
    <div class="slabel" id="lbl-must45"></div>

    <div class="mcard ready" id="mc" onclick="toggleMust()">
      <div class="cbtn" id="cb">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M4 11L9 16.5L18 5.5" stroke="#111" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="mbody">
        <div class="mname" id="mn"></div>
        <div class="msub" id="msub"></div>
        <span class="mpill" id="mp"></span>
      </div>
      <div class="marr">›</div>
    </div>

    <div class="pcard">
      <div class="prow">
        <div class="ptitle" id="lbl-progress"></div>
        <div class="pval" id="pv">0/7</div>
      </div>
      <div class="ptrack"><div class="pfill" id="pf" style="width:0%"></div></div>
    </div>

    <div class="slabel" id="lbl-blocks"></div>
    <div class="blist" id="blks"></div>

    <button class="nbtn" onclick="doNotif()">
      <div class="nico">🔔</div>
      <div class="nbd">
        <div class="ntitle" id="nt"></div>
        <div class="nsub">06.00 · 09.00 · 12.00 · 15.00 · 18.00</div>
      </div>
      <div class="narr">›</div>
    </button>
  </div>

  <div class="px sec" id="sec-week">
    <div class="slabel" id="lbl-thisweek"></div>
    <div class="wstrip" id="wr"></div>
    <div class="lcard" id="wlist"></div>
  </div>

  <div class="px sec" id="sec-hist">
    <div class="slabel" id="lbl-history"></div>
    <div class="lcard" id="hlist"></div>
  </div>

</div>

<script>
/* ── DATA ── */
const MUST={
  0:{n:'Dr. Yusuf Suseno',t:{id:'MENTORING',en:'MENTORING'},bg:'rgba(245,166,35,.18)',tc:'#F5A623'},
  1:{n:'Pathoma',t:{id:'PATOLOGI',en:'PATHOLOGY'},bg:'rgba(155,114,207,.18)',tc:'#B89EE8'},
  2:{n:'ACLS',t:{id:'KEGAWATAN',en:'EMERGENCY'},bg:'rgba(232,83,58,.18)',tc:'#E8765A'},
  3:{n:'Reading PPK',t:{id:'PANDUAN KLINIS',en:'CLINICAL GUIDE'},bg:'rgba(91,141,239,.18)',tc:'#7AAAF5'},
  4:{n:'Cardiology',t:{id:'KARDIOLOGI',en:'CARDIOLOGY'},bg:'rgba(232,83,58,.18)',tc:'#E8765A'},
  5:{n:'Ebook Reading',t:{id:'LITERASI',en:'LITERACY'},bg:'rgba(78,205,196,.18)',tc:'#4ECDC4'},
  6:{n:'Reading IPD',t:{id:'PENYAKIT DALAM',en:'INTERNAL MED'},bg:'rgba(91,141,239,.18)',tc:'#7AAAF5'}
};
const BLK=[
  {e:'☀️',t:'06.00–09.00',id:'Siap-siap, membaca, mandi, olahraga, sarapan',en:'Morning prep, reading, shower, exercise, breakfast'},
  {e:'💼',t:'09.00–12.00',id:'Kerja',en:'Work'},
  {e:'🛌',t:'12.00–15.00',id:'Tidur siang',en:'Afternoon nap'},
  {e:'📖',t:'15.00–18.00',id:'Olahraga, belajar 45 mnt wajib, ceklok',en:'Exercise, 45-min study, check out'},
  {e:'🌙',t:'18.00–24.00',id:'Membaca, nonton, tidur',en:'Reading, watching, sleep'}
];
const BH=[[6,9],[9,12],[12,15],[15,18],[18,24]];

const DN={id:['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'],en:['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']};
const DS={id:['MIN','SEN','SEL','RAB','KAM','JUM','SAB'],en:['SUN','MON','TUE','WED','THU','FRI','SAT']};

const T={
  id:{
    greet:['SELAMAT PAGI','SELAMAT SIANG','SELAMAT SORE','SELAMAT MALAM'],
    streak:'HARI 🔥',
    week:'minggu ini',month:'bulan ini',total:'total',
    tab1:'Hari ini',tab2:'Minggu',tab3:'Riwayat',
    must45:'45 menit wajib',
    msub:'45 mnt · 15.00–18.00',
    progress:'Progress minggu ini',
    blocks:'Blok waktu',
    thisweek:'Minggu ini',
    history:'14 hari terakhir',
    notifOn:'Aktifkan pengingat harian',
    notifActive:'Pengingat aktif ✓',
    done:'Selesai',notdone:'Belum',
    now:'SEKARANG',
    today:'hari ini',
    notifMsgs:['Selamat pagi! Waktunya siap-siap.','Jam kerja dimulai. Semangat!','Istirahat siang, waktunya tidur.','Waktunya belajar 45 menit wajib!','Sudah selesai belajar hari ini?'],
    notifTitle:'Jadwal Belajar',
  },
  en:{
    greet:['GOOD MORNING','GOOD AFTERNOON','GOOD AFTERNOON','GOOD EVENING'],
    streak:'DAY STREAK 🔥',
    week:'this week',month:'this month',total:'total',
    tab1:'Today',tab2:'Week',tab3:'History',
    must45:'45-min must-do',
    msub:'45 min · 15:00–18:00',
    progress:'This week\'s progress',
    blocks:'Time blocks',
    thisweek:'This week',
    history:'Last 14 days',
    notifOn:'Enable daily reminders',
    notifActive:'Reminders active ✓',
    done:'Done',notdone:'Pending',
    now:'NOW',
    today:'today',
    notifMsgs:['Good morning! Time to get ready.','Work time. Let\'s go!','Afternoon rest, time to nap.','Time for your 45-min study!','Did you finish studying today?'],
    notifTitle:'Study Schedule',
  }
};

/* ── STATE ── */
function fk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function tk(){return fk(new Date())}
function load(){try{const r=localStorage.getItem('jadwal-v3');return r?JSON.parse(r):{data:{},lang:'id'};}catch(e){return {data:{},lang:'id'};}}
function save(){try{localStorage.setItem('jadwal-v3',JSON.stringify(STATE));}catch(e){}}

let STATE=load();
if(!STATE.data)STATE={data:{},lang:'id'};
let L=STATE.lang||'id';

/* ── HELPERS ── */
function abk(){const h=new Date().getHours()+new Date().getMinutes()/60;return BH.findIndex(([s,e])=>h>=s&&h<e);}
function wdays(){const t=new Date(),dw=t.getDay(),a=[];for(let i=0;i<7;i++){const d=new Date(t);d.setDate(t.getDate()-dw+i);a.push({key:fk(d),dw:i});}return a;}
function streak(){let s=0,d=new Date();for(let i=0;i<90;i++){if(STATE.data[fk(d)])s++;else if(i>0)break;d.setDate(d.getDate()-1);}return s;}
function cMonth(){const n=new Date(),d=new Date(n.getFullYear(),n.getMonth(),1);let c=0;while(d.getMonth()===n.getMonth()&&d<=n){if(STATE.data[fk(d)])c++;d.setDate(d.getDate()+1);}return c;}
function cTotal(){return Object.keys(STATE.data).filter(k=>STATE.data[k]).length;}
function greet(){const h=new Date().getHours();const i=h<11?0:h<14?1:h<18?2:3;return T[L].greet[i];}

/* ── RENDER ── */
function render(){
  const now=new Date(),dw=now.getDay(),key=tk(),done=!!STATE.data[key],mu=MUST[dw];
  const tx=T[L];

  /* header */
  document.getElementById('greet').textContent=greet();
  document.getElementById('dayname').textContent=DN[L][dw];
  document.getElementById('datestr').textContent=now.toLocaleDateString(L==='id'?'id-ID':'en-GB',{day:'numeric',month:'long',year:'numeric'}).toUpperCase();
  document.getElementById('stn').textContent=streak();
  document.getElementById('slbl-streak').textContent=tx.streak;

  /* lang toggle */
  document.getElementById('lt-id').className='ltab'+(L==='id'?' on':'');
  document.getElementById('lt-en').className='ltab'+(L==='en'?' on':'');

  /* stats labels */
  document.getElementById('lbl-week').textContent=tx.week;
  document.getElementById('lbl-month').textContent=tx.month;
  document.getElementById('lbl-total').textContent=tx.total;

  /* stats values */
  const wd=wdays(),wc=wd.filter(d=>STATE.data[d.key]).length;
  document.getElementById('sw').textContent=wc;
  document.getElementById('sm').textContent=cMonth();
  document.getElementById('stot').textContent=cTotal();

  /* tabs */
  document.getElementById('tab-today').textContent=tx.tab1;
  document.getElementById('tab-week').textContent=tx.tab2;
  document.getElementById('tab-hist').textContent=tx.tab3;

  /* must */
  document.getElementById('lbl-must45').textContent=tx.must45;
  document.getElementById('mn').textContent=mu.n;
  document.getElementById('msub').textContent=tx.msub;
  const mp=document.getElementById('mp');mp.textContent=mu.t[L];mp.style.background=mu.bg;mp.style.color=mu.tc;
  document.getElementById('mc').className='mcard'+(done?' done':' ready');
  document.getElementById('cb').className='cbtn'+(done?' on':'');

  /* progress */
  document.getElementById('lbl-progress').textContent=tx.progress;
  document.getElementById('pv').textContent=wc+'/7';
  document.getElementById('pf').style.width=Math.round(wc/7*100)+'%';

  /* blocks */
  document.getElementById('lbl-blocks').textContent=tx.blocks;
  const ab=abk();
  document.getElementById('blks').innerHTML=BLK.map((b,i)=>{
    const isN=i===ab;
    return`<div class="blk${isN?' now':''}"><div class="bico">${b.e}</div><div class="bbd"><div class="bbt">${b.t}${isN?`<span class="nchip">${tx.now}</span>`:''}</div><div class="bbd2">${b[L]}</div></div></div>`;
  }).join('');

  /* notif */
  document.getElementById('nt').textContent=
    (typeof Notification!=='undefined'&&Notification.permission==='granted')?tx.notifActive:tx.notifOn;

  /* week tab */
  document.getElementById('lbl-thisweek').textContent=tx.thisweek;
  document.getElementById('wr').innerHTML=wd.map(d=>{
    const isT=d.key===key,isDone=!!STATE.data[d.key];
    return`<div class="wd${isT?' today':isDone?' donew':''}"><span class="wdl">${DS[L][d.dw]}</span><div class="wdot"></div></div>`;
  }).join('');
  document.getElementById('wlist').innerHTML=wd.map(d=>{
    const mu2=MUST[d.dw],isDone=!!STATE.data[d.key],isT=d.key===key;
    return`<div class="ritem"><div class="rdot" style="background:${isDone?'#F5E642':'#2A2A2A'}"></div><div class="rdate">${DS[L][d.dw]}${isT?' •':''}</div><div class="rname">${mu2.n}</div><div class="rok" style="color:${isDone?'#F5E642':'#333'}">${isDone?'✓':'–'}</div></div>`;
  }).join('');

  /* history tab */
  document.getElementById('lbl-history').textContent=tx.history;
  let hr='';
  for(let i=0;i<14;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const k=fk(d),mu2=MUST[d.getDay()],isDone=!!STATE.data[k];
    const dstr=d.toLocaleDateString(L==='id'?'id-ID':'en-GB',{day:'numeric',month:'short'}).toUpperCase();
    hr+=`<div class="ritem"><div class="rdot" style="background:${isDone?'#F5E642':'#2A2A2A'}"></div><div class="rdate">${dstr}</div><div class="rname">${mu2.n}</div><div class="rok" style="color:${isDone?'#F5E642':'#333'}">${isDone?'✓':'–'}</div></div>`;
  }
  document.getElementById('hlist').innerHTML=hr;
}

/* ── ACTIONS ── */
function toggleMust(){
  const k=tk();if(STATE.data[k])delete STATE.data[k];else STATE.data[k]=true;
  save();render();
}
function showTab(id,el){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('show'));
  document.getElementById('sec-'+id).classList.add('show');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
}
function setLang(l){
  L=l;STATE.lang=l;save();render();
}
function doNotif(){
  if(!('Notification' in window)){alert(L==='id'?'Browser tidak mendukung notifikasi.':'Your browser does not support notifications.');return;}
  Notification.requestPermission().then(p=>{
    if(p==='granted'){scheduleNotifs();render();}
  });
}
function scheduleNotifs(){
  const msgs=T[L].notifMsgs,title=T[L].notifTitle;
  [6,9,12,15,18].forEach((h,i)=>{
    const t=new Date();t.setHours(h,0,0,0);
    if(t>new Date())setTimeout(()=>new Notification(title,{body:msgs[i]}),t-new Date());
  });
}
if(typeof Notification!=='undefined'&&Notification.permission==='granted')scheduleNotifs();
render();
setInterval(render,60000);
</script>
